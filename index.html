<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Check-In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #E9A226;
    --orange-dim: rgba(233,162,38,0.1);
    --orange-border: rgba(233,162,38,0.25);
    --green: #32CD8D;
    --green-dim: rgba(50,205,141,0.1);
    --red: #E54417;
    --red-dim: rgba(229,68,23,0.1);
    --surface: #ffffff;
    --surface-2: #f7f7f6;
    --surface-3: #f0f0ef;
    --border: rgba(0,0,0,0.08);
    --border-med: rgba(0,0,0,0.13);
    --text: #0d0d0d;
    --text-2: #555555;
    --text-3: #878787;
    --radius: 10px;
    --radius-sm: 6px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --surface: #141414;
      --surface-2: #1c1c1c;
      --surface-3: #242424;
      --border: rgba(255,255,255,0.07);
      --border-med: rgba(255,255,255,0.13);
      --text: #f0f0ee;
      --text-2: #a0a09c;
      --text-3: #606060;
    }
  }

  html, body {
    min-height: 100%;
    background: var(--surface-2);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 0 20px;
    border-bottom: 0.5px solid var(--border-med);
    margin-bottom: 24px;
  }

  .header h1 {
    font-size: 19px;
    font-weight: 500;
    letter-spacing: -0.4px;
    color: var(--text);
  }

  .header-date {
    font-size: 12px;
    color: var(--text-3);
    font-family: 'DM Mono', monospace;
    margin-top: 3px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .stats {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--text-3);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .stat-done { color: var(--green); font-weight: 500; }

  .eod-btn {
    font-size: 12px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-2);
    background: var(--surface);
    border: 0.5px solid var(--border-med);
    border-radius: var(--radius-sm);
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .eod-btn:hover { border-color: var(--orange); color: var(--orange); }

  /* Import card */
  .import-card {
    background: var(--surface);
    border: 0.5px solid var(--border-med);
    border-radius: var(--radius);
    margin-bottom: 20px;
    overflow: hidden;
  }

  .import-header {
    background: #0d0d0d;
    padding: 11px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .import-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--orange);
    flex-shrink: 0;
  }

  .import-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
  }

  .import-body {
    padding: 14px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .import-textarea {
    flex: 1;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    background: var(--surface-2);
    border: 0.5px solid var(--border-med);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    color: var(--text);
    resize: none;
    height: 90px;
    outline: none;
    line-height: 1.55;
    transition: border-color 0.15s;
  }
  .import-textarea:focus { border-color: var(--orange); }
  .import-textarea::placeholder { color: var(--text-3); line-height: 1.6; }

  .import-btn {
    font-size: 13px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    color: #0d0d0d;
    background: var(--orange);
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 18px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-end;
  }
  .import-btn:hover { background: #d4911f; }
  .import-btn:active { transform: scale(0.97); }

  /* Section labels */
  .section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-3);
    margin: 20px 0 8px 2px;
  }

  /* Action items */
  .action-list { display: flex; flex-direction: column; gap: 2px; }

  .action-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 14px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    border-left-width: 2px;
    transition: border-color 0.15s;
    animation: fadeIn 0.18s ease;
    position: relative;
  }
  .action-item:hover { border-color: var(--border-med); }
  .action-item.p1 { border-left-color: var(--red); }
  .action-item.p2 { border-left-color: var(--orange); }
  .action-item.p3 { border-left-color: var(--text-3); }
  .action-item.carried { background: var(--surface-3); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .check-wrap {
    width: 18px;
    height: 18px;
    border: 1px solid var(--border-med);
    border-radius: 4px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    transition: all 0.15s;
    background: transparent;
  }
  .check-wrap:hover { border-color: var(--orange); }
  .check-wrap.checked { background: var(--orange); border-color: var(--orange); }
  .check-wrap svg { display: none; }
  .check-wrap.checked svg { display: block; }

  .action-content { flex: 1; min-width: 0; }

  .action-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.45;
  }
  .action-item.done .action-text {
    text-decoration: line-through;
    color: var(--text-3);
  }

  .action-meta {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-top: 3px;
    flex-wrap: wrap;
  }

  .meta-source {
    font-size: 11px;
    color: var(--text-3);
    font-family: 'DM Mono', monospace;
  }

  .carried-tag {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-3);
    background: var(--surface-3);
    border: 0.5px solid var(--border-med);
    border-radius: 3px;
    padding: 1px 5px;
    letter-spacing: 0.04em;
  }

  .action-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.15s;
    margin-top: 1px;
  }
  .action-item:hover .action-right { opacity: 1; }

  .pip {
    font-size: 10px;
    font-weight: 500;
    font-family: 'DM Mono', monospace;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.04em;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .pip.p1 { background: var(--red-dim); color: var(--red); }
  .pip.p2 { background: var(--orange-dim); color: var(--orange); }
  .pip.p3 { background: var(--surface-3); color: var(--text-3); }

  .del-btn {
    background: none;
    border: none;
    color: var(--text-3);
    cursor: pointer;
    font-size: 16px;
    padding: 0;
    line-height: 1;
    transition: color 0.15s;
  }
  .del-btn:hover { color: var(--red); }

  /* Add row */
  .add-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    align-items: center;
  }

  .add-input {
    flex: 1;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    border: 0.5px solid var(--border-med);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .add-input:focus { border-color: var(--orange); }
  .add-input::placeholder { color: var(--text-3); }

  .priority-select {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    background: var(--surface);
    border: 0.5px solid var(--border-med);
    border-radius: var(--radius-sm);
    padding: 9px 8px;
    color: var(--text-2);
    cursor: pointer;
    outline: none;
    width: 88px;
  }

  .add-btn {
    font-size: 13px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    color: var(--surface);
    background: #0d0d0d;
    border: none;
    border-radius: var(--radius-sm);
    padding: 9px 16px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .add-btn:hover { background: #333; }
  .add-btn:active { transform: scale(0.97); }

  /* Empty state */
  .empty-list {
    text-align: center;
    padding: 36px 20px;
    color: var(--text-3);
    font-size: 13px;
    border: 0.5px dashed var(--border-med);
    border-radius: var(--radius);
  }
  .empty-list strong {
    display: block;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-2);
    margin-bottom: 5px;
  }

  /* EOD overlay */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 0.5px solid var(--border-med);
    border-radius: 14px;
    width: 100%;
    max-width: 540px;
    overflow: hidden;
    animation: modalIn 0.18s ease;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    background: #0d0d0d;
    padding: 15px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .modal-title {
    font-size: 13px;
    font-weight: 500;
    color: #ffffff;
    letter-spacing: -0.2px;
  }

  .close-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.45);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    padding: 0;
    transition: color 0.15s;
  }
  .close-btn:hover { color: white; }

  .modal-body {
    padding: 20px;
    overflow-y: auto;
    flex: 1;
  }

  .modal-section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 10px;
  }

  .eod-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    background: var(--surface-2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    margin-bottom: 5px;
  }

  .eod-item-text { flex: 1; font-size: 13px; color: var(--text); line-height: 1.4; }

  .choice-wrap { display: flex; gap: 4px; flex-shrink: 0; }

  .choice-btn {
    font-size: 11px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    border: 0.5px solid var(--border-med);
    border-radius: 4px;
    padding: 3px 9px;
    cursor: pointer;
    background: var(--surface);
    color: var(--text-2);
    transition: all 0.15s;
  }
  .choice-carry.active { background: var(--orange-dim); border-color: var(--orange); color: var(--orange); }
  .choice-drop.active  { background: var(--red-dim); border-color: var(--red); color: var(--red); }

  .modal-footer {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    padding: 16px 20px;
    border-top: 0.5px solid var(--border);
    flex-shrink: 0;
  }

  .btn-cancel {
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-2);
    background: var(--surface-2);
    border: 0.5px solid var(--border-med);
    border-radius: var(--radius-sm);
    padding: 9px 16px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-confirm {
    font-size: 13px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    color: #0d0d0d;
    background: var(--orange);
    border: none;
    border-radius: var(--radius-sm);
    padding: 9px 20px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-confirm:hover { background: #d4911f; }

  .all-done-msg {
    font-size: 13px;
    color: var(--text-3);
    padding: 16px 0 8px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div>
      <h1>Morning check-in</h1>
      <div class="header-date" id="today-date"></div>
    </div>
    <div class="header-right">
      <div class="stats">
        <span class="stat-done" id="stat-done">0</span>
        <span>/</span>
        <span id="stat-total">0</span>
        <span>done</span>
      </div>
      <button class="eod-btn" onclick="openEOD()">End of day →</button>
    </div>
  </div>

  <div class="import-card">
    <div class="import-header">
      <div class="import-dot"></div>
      <span class="import-title">Paste morning output from Claude</span>
    </div>
    <div class="import-body">
      <textarea
        class="import-textarea"
        id="import-textarea"
        placeholder="Paste your master to-do list here. Each line becomes a checklist item. Lines with words like 'urgent', 'ASAP', or 'blocker' get flagged P1 automatically."
      ></textarea>
      <button class="import-btn" onclick="importList()">Import →</button>
    </div>
  </div>

  <div id="carried-section" style="display:none">
    <div class="section-label">Carried forward</div>
    <div class="action-list" id="carried-list"></div>
  </div>

  <div class="section-label">Today</div>
  <div class="action-list" id="today-list"></div>

  <div class="add-row">
    <input
      class="add-input"
      id="add-input"
      type="text"
      placeholder="Add something that just came up..."
      onkeydown="if(event.key==='Enter')addManual()"
    >
    <select class="priority-select" id="add-priority">
      <option value="1">P1 urgent</option>
      <option value="2" selected>P2 today</option>
      <option value="3">P3 later</option>
    </select>
    <button class="add-btn" onclick="addManual()">+ Add</button>
  </div>

</div>

<!-- EOD Modal -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeEOD()">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">End of day — what carries forward?</span>
      <button class="close-btn" onclick="closeEOD()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-section-label">Unfinished items</div>
      <div id="eod-items"></div>
      <div class="all-done-msg" id="eod-all-done" style="display:none">Everything checked off. Nice work.</div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEOD()">Cancel</button>
      <button class="btn-confirm" onclick="confirmEOD()">Close out day →</button>
    </div>
  </div>
</div>

<script>
const STORE = 'checkin-v3';
let state = { actions: [], counter: 0, lastDate: '' };
let eodChoices = {};

function load() {
  try {
    const raw = localStorage.getItem(STORE);
    if (raw) state = JSON.parse(raw);
  } catch(e) {}
  rolloverCheck();
  render();
}

function save() {
  localStorage.setItem(STORE, JSON.stringify(state));
}

function todayStr() {
  return new Date().toDateString();
}

function rolloverCheck() {
  const today = todayStr();
  if (state.lastDate && state.lastDate !== today) {
    // New day: drop done items, mark remaining as carried
    state.actions = state.actions
      .filter(a => !a.done)
      .map(a => ({ ...a, carried: true }));
  }
  state.lastDate = today;
  save();
}

// Parse pasted list — no AI, just smart line detection
function importList() {
  const raw = document.getElementById('import-textarea').value.trim();
  if (!raw) return;

  const lines = raw.split('\n')
    .map(l => l
      .replace(/^[\s\-\*\u2022\u2013\u2014\d]+[\.\)]\s*/, '') // strip bullets, numbers
      .replace(/^\[.\]\s*/, '')   // strip [ ] or [x]
      .replace(/^#+\s*/, '')      // strip markdown headers
      .trim()
    )
    .filter(l => l.length > 2);

  lines.forEach(line => {
    let priority = 2;
    let source = '';

    // Priority detection
    if (/\b(urgent|asap|blocker|p1|critical|today|immediately|right away|fire)\b/i.test(line)) priority = 1;
    else if (/\b(p3|later|someday|eventually|low priority|nice to have|backlog)\b/i.test(line)) priority = 3;

    // Source detection — look for common prefixes like "Slack:", "Email:", "Fuse -"
    const sourceMatch = line.match(/^(slack|email|calendar|granola|clickup|notion|pipeline|fuse|forge|knock|tcr|fmg|lucas|craig|ali|lam|brandon|michelle|rose)\s*[:\-–]\s*/i);
    if (sourceMatch) {
      source = sourceMatch[1];
      line = line.slice(sourceMatch[0].length).trim();
    }

    if (line.length > 1) addAction(line, priority, source, false);
  });

  document.getElementById('import-textarea').value = '';
  render();
}

function addAction(text, priority, source, rerender) {
  if (!text.trim()) return;
  state.actions.push({
    id: ++state.counter,
    text: text.trim(),
    priority: parseInt(priority),
    source: source || '',
    done: false,
    carried: false
  });
  save();
  if (rerender !== false) render();
}

function addManual() {
  const inp = document.getElementById('add-input');
  const pri = document.getElementById('add-priority').value;
  addAction(inp.value, pri, 'manual');
  inp.value = '';
}

function toggleDone(id) {
  const a = state.actions.find(x => x.id === id);
  if (a) { a.done = !a.done; save(); render(); }
}

function cyclePriority(id) {
  const a = state.actions.find(x => x.id === id);
  if (a) { a.priority = a.priority === 3 ? 1 : a.priority + 1; save(); render(); }
}

function deleteAction(id) {
  state.actions = state.actions.filter(x => x.id !== id);
  save();
  render();
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderList(el, items) {
  if (!items.length) { el.innerHTML = ''; return; }
  const sorted = [...items].sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    return a.priority - b.priority;
  });
  el.innerHTML = sorted.map(a => `
    <div class="action-item p${a.priority}${a.done ? ' done' : ''}${a.carried ? ' carried' : ''}">
      <div class="check-wrap${a.done ? ' checked' : ''}" onclick="toggleDone(${a.id})">
        <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
          <path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="action-content">
        <div class="action-text">${esc(a.text)}</div>
        <div class="action-meta">
          ${a.source && a.source !== 'manual' ? `<span class="meta-source">${esc(a.source)}</span>` : ''}
          ${a.carried ? '<span class="carried-tag">carried forward</span>' : ''}
        </div>
      </div>
      <div class="action-right">
        <button class="pip p${a.priority}" onclick="cyclePriority(${a.id})" title="Click to change priority">P${a.priority}</button>
        <button class="del-btn" onclick="deleteAction(${a.id})">×</button>
      </div>
    </div>
  `).join('');
}

function render() {
  document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric'
  });

  const carried = state.actions.filter(a => a.carried);
  const today   = state.actions.filter(a => !a.carried);

  // Carried section
  const carriedSection = document.getElementById('carried-section');
  carriedSection.style.display = carried.length ? 'block' : 'none';
  renderList(document.getElementById('carried-list'), carried);

  // Today section
  const todayEl = document.getElementById('today-list');
  if (today.length === 0) {
    todayEl.innerHTML = `
      <div class="empty-list">
        <strong>Nothing here yet</strong>
        Paste your Claude output above to populate your day
      </div>`;
  } else {
    renderList(todayEl, today);
  }

  // Stats
  const total = state.actions.length;
  const done  = state.actions.filter(a => a.done).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-done').textContent  = done;
}

// EOD
function openEOD() {
  const unfinished = state.actions.filter(a => !a.done);
  eodChoices = {};
  const container = document.getElementById('eod-items');
  const allDone   = document.getElementById('eod-all-done');

  if (!unfinished.length) {
    container.innerHTML = '';
    allDone.style.display = 'block';
  } else {
    allDone.style.display = 'none';
    container.innerHTML = unfinished.map(a => `
      <div class="eod-item">
        <span class="eod-item-text">${esc(a.text)}</span>
        <div class="choice-wrap">
          <button class="choice-btn choice-carry" id="carry-${a.id}" onclick="setChoice(${a.id},'carry')">Carry →</button>
          <button class="choice-btn choice-drop"  id="drop-${a.id}"  onclick="setChoice(${a.id},'drop')">Drop</button>
        </div>
      </div>
    `).join('');
    // Default all to carry
    unfinished.forEach(a => setChoice(a.id, 'carry'));
  }

  document.getElementById('overlay').classList.add('open');
}

function setChoice(id, choice) {
  eodChoices[id] = choice;
  const c = document.getElementById('carry-' + id);
  const d = document.getElementById('drop-' + id);
  if (c) c.className = 'choice-btn choice-carry' + (choice === 'carry' ? ' active' : '');
  if (d) d.className = 'choice-btn choice-drop'  + (choice === 'drop'  ? ' active' : '');
}

function confirmEOD() {
  Object.entries(eodChoices).forEach(([id, choice]) => {
    const numId = parseInt(id);
    if (choice === 'drop') {
      state.actions = state.actions.filter(a => a.id !== numId);
    } else {
      const a = state.actions.find(x => x.id === numId);
      if (a) { a.carried = true; }
    }
  });
  // Clear done items that weren't explicitly carried
  state.actions = state.actions.filter(a => !a.done || a.carried);
  save();
  closeEOD();
  render();
}

function closeEOD() {
  document.getElementById('overlay').classList.remove('open');
}

load();
</script>
</body>
</html>
