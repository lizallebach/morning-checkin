<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Check-In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0d0d0d;
    --white: #ffffff;
    --orange: #E9A226;
    --orange-dim: rgba(233,162,38,0.1);
    --orange-border: rgba(233,162,38,0.25);
    --gray-1: #F0F0F0;
    --gray-2: #d0d0d0;
    --gray-3: #A5A5A5;
    --gray-4: #878787;
    --gray-5: #555555;
    --green: #32CD8D;
    --green-dim: rgba(50,205,141,0.1);
    --red: #E54417;
    --red-dim: rgba(229,68,23,0.1);
    --surface: #ffffff;
    --surface-2: #f7f7f6;
    --surface-3: #f0f0ef;
    --border: rgba(0,0,0,0.08);
    --border-med: rgba(0,0,0,0.14);
    --text: #0d0d0d;
    --text-2: #555555;
    --text-3: #878787;
    --radius: 10px;
    --radius-sm: 6px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --surface: #141414;
      --surface-2: #1c1c1c;
      --surface-3: #242424;
      --border: rgba(255,255,255,0.08);
      --border-med: rgba(255,255,255,0.14);
      --text: #f0f0ee;
      --text-2: #a0a09c;
      --text-3: #666662;
      --gray-1: #2a2a2a;
      --gray-2: #333333;
    }
  }

  html, body {
    height: 100%;
    background: var(--surface-2);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 0 20px;
    border-bottom: 0.5px solid var(--border-med);
    margin-bottom: 24px;
  }

  .header-left { display: flex; flex-direction: column; gap: 2px; }

  .header h1 {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.4px;
    color: var(--text);
  }

  .header-date {
    font-size: 12px;
    color: var(--text-3);
    font-family: 'DM Mono', monospace;
  }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .eod-btn {
    font-size: 12px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-2);
    background: var(--surface);
    border: 0.5px solid var(--border-med);
    border-radius: var(--radius-sm);
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .eod-btn:hover { border-color: var(--orange); color: var(--orange); }

  .stats-row {
    display: flex;
    gap: 6px;
    align-items: center;
    font-size: 12px;
    color: var(--text-3);
    font-family: 'DM Mono', monospace;
  }

  .stat { color: var(--text-2); }
  .stat-done { color: var(--green); }

  /* Import section */
  .import-card {
    background: var(--surface);
    border: 0.5px solid var(--border-med);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
  }

  .import-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--black);
  }

  .import-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .import-title::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--orange);
  }

  .import-body {
    padding: 14px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .import-textarea {
    flex: 1;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    background: var(--surface-2);
    border: 0.5px solid var(--border-med);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    color: var(--text);
    resize: none;
    height: 80px;
    outline: none;
    line-height: 1.5;
    transition: border-color 0.15s;
  }
  .import-textarea:focus { border-color: var(--orange); }
  .import-textarea::placeholder { color: var(--text-3); }

  .import-btn {
    font-size: 13px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    color: var(--black);
    background: var(--orange);
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 18px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .import-btn:hover { background: #d4911f; }
  .import-btn:active { transform: scale(0.97); }
  .import-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Section grouping */
  .section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-3);
    margin: 20px 0 8px;
    padding-left: 2px;
  }

  /* Action items */
  .action-list { display: flex; flex-direction: column; gap: 1px; }

  .action-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 14px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    transition: all 0.15s;
    animation: slideIn 0.2s ease;
    position: relative;
  }

  .action-item:hover { border-color: var(--border-med); }
  .action-item.priority-1 { border-left: 2px solid var(--red); }
  .action-item.priority-2 { border-left: 2px solid var(--orange); }
  .action-item.priority-3 { border-left: 2px solid var(--gray-3); }
  .action-item.carried { background: var(--surface-3); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .check-wrap {
    width: 18px;
    height: 18px;
    border: 1px solid var(--gray-2);
    border-radius: 4px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    transition: all 0.15s;
    background: transparent;
  }
  .check-wrap:hover { border-color: var(--orange); }
  .check-wrap.checked { background: var(--orange); border-color: var(--orange); }
  .check-wrap svg { display: none; }
  .check-wrap.checked svg { display: block; }

  .action-content { flex: 1; min-width: 0; }

  .action-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.45;
    transition: all 0.2s;
  }

  .action-item.done .action-text {
    text-decoration: line-through;
    color: var(--text-3);
  }

  .action-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 3px;
  }

  .meta-source {
    font-size: 11px;
    color: var(--text-3);
    font-family: 'DM Mono', monospace;
  }

  .carried-badge {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-3);
    background: var(--surface-3);
    border: 0.5px solid var(--border-med);
    border-radius: 3px;
    padding: 1px 5px;
    letter-spacing: 0.05em;
  }

  .action-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .action-item:hover .action-right { opacity: 1; }

  .priority-pip {
    font-size: 10px;
    font-weight: 500;
    font-family: 'DM Mono', monospace;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.05em;
  }
  .pip-1 { background: var(--red-dim); color: var(--red); }
  .pip-2 { background: var(--orange-dim); color: var(--orange); }
  .pip-3 { background: var(--surface-3); color: var(--text-3); }

  .del-btn {
    background: none;
    border: none;
    color: var(--text-3);
    cursor: pointer;
    font-size: 15px;
    padding: 0;
    line-height: 1;
    transition: color 0.15s;
  }
  .del-btn:hover { color: var(--red); }

  /* Add row */
  .add-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    align-items: center;
  }

  .add-input {
    flex: 1;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    border: 0.5px solid var(--border-med);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .add-input:focus { border-color: var(--orange); }
  .add-input::placeholder { color: var(--text-3); }

  .priority-select {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    background: var(--surface);
    border: 0.5px solid var(--border-med);
    border-radius: var(--radius-sm);
    padding: 9px 10px;
    color: var(--text-2);
    cursor: pointer;
    outline: none;
    width: 90px;
  }

  .add-btn {
    font-size: 13px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    color: var(--white);
    background: var(--black);
    border: none;
    border-radius: var(--radius-sm);
    padding: 9px 16px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .add-btn:hover { background: #333; }
  .add-btn:active { transform: scale(0.97); }

  /* EOD overlay */
  .eod-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .eod-overlay.open { display: flex; }

  .eod-modal {
    background: var(--surface);
    border: 0.5px solid var(--border-med);
    border-radius: 14px;
    width: 100%;
    max-width: 560px;
    overflow: hidden;
    animation: modalIn 0.2s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .eod-modal-header {
    background: var(--black);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .eod-modal-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--white);
    letter-spacing: -0.2px;
  }

  .close-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.5);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    padding: 0;
    transition: color 0.15s;
  }
  .close-btn:hover { color: white; }

  .eod-body { padding: 20px; }

  .eod-section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 10px;
  }

  .eod-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    background: var(--surface-2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    margin-bottom: 6px;
  }

  .eod-item-text { flex: 1; font-size: 13px; color: var(--text); }

  .eod-choice {
    display: flex;
    gap: 4px;
  }

  .choice-btn {
    font-size: 11px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    border: 0.5px solid var(--border-med);
    border-radius: 4px;
    padding: 3px 8px;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--surface);
    color: var(--text-2);
  }
  .choice-btn:hover { border-color: var(--orange); color: var(--orange); }
  .choice-btn.selected-carry { background: var(--orange-dim); border-color: var(--orange); color: var(--orange); }
  .choice-btn.selected-drop { background: var(--red-dim); border-color: var(--red); color: var(--red); }

  .eod-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 0.5px solid var(--border);
  }

  .eod-confirm-btn {
    font-size: 13px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    color: var(--black);
    background: var(--orange);
    border: none;
    border-radius: var(--radius-sm);
    padding: 9px 20px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .eod-confirm-btn:hover { background: #d4911f; }

  .eod-cancel-btn {
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-2);
    background: var(--surface-2);
    border: 0.5px solid var(--border-med);
    border-radius: var(--radius-sm);
    padding: 9px 16px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .eod-cancel-btn:hover { border-color: var(--border-med); }

  .empty-list {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-3);
    font-size: 13px;
    border: 0.5px dashed var(--border-med);
    border-radius: var(--radius);
    background: var(--surface);
  }

  .empty-list strong {
    display: block;
    font-size: 15px;
    font-weight: 500;
    color: var(--text-2);
    margin-bottom: 6px;
  }

  /* Anthropic API key notice */
  .api-notice {
    font-size: 11px;
    color: var(--text-3);
    text-align: center;
    padding: 12px;
    border: 0.5px dashed var(--border-med);
    border-radius: var(--radius-sm);
    margin-bottom: 16px;
    line-height: 1.6;
  }
  .api-notice a { color: var(--orange); text-decoration: none; }

  .api-key-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .api-key-input {
    flex: 1;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    background: var(--surface-2);
    border: 0.5px solid var(--border-med);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .api-key-input:focus { border-color: var(--orange); }
  .api-key-btn {
    font-size: 12px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    background: var(--surface-3);
    border: 0.5px solid var(--border-med);
    border-radius: var(--radius-sm);
    padding: 8px 14px;
    cursor: pointer;
    color: var(--text-2);
    transition: all 0.15s;
  }
  .api-key-btn:hover { border-color: var(--orange); color: var(--orange); }

  .key-status {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    padding: 3px 8px;
    border-radius: 3px;
  }
  .key-set { background: var(--green-dim); color: var(--green); }
  .key-missing { background: var(--red-dim); color: var(--red); }

  @media (max-width: 600px) {
    .add-row { flex-wrap: wrap; }
    .priority-select { width: 100%; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-left">
      <h1>Morning check-in</h1>
      <span class="header-date" id="today-date"></span>
    </div>
    <div class="header-right">
      <div class="stats-row">
        <span class="stat-done" id="stat-done">0</span>
        <span>/</span>
        <span class="stat" id="stat-total">0</span>
        <span>done</span>
      </div>
      <button class="eod-btn" onclick="openEOD()">End of day →</button>
    </div>
  </div>

  <!-- API Key setup -->
  <div id="api-setup">
    <div class="api-key-row">
      <input class="api-key-input" type="password" id="api-key-input" placeholder="Paste your Anthropic API key (sk-ant-...)">
      <button class="api-key-btn" onclick="saveApiKey()">Save key</button>
      <span class="key-status key-missing" id="key-status">No key</span>
    </div>
  </div>

  <!-- Import from Claude output -->
  <div class="import-card">
    <div class="import-header">
      <span class="import-title">Paste morning output from Claude</span>
    </div>
    <div class="import-body">
      <textarea class="import-textarea" id="import-textarea" placeholder="Paste your master to-do list from the Claude project here — I'll parse it into your checklist..."></textarea>
      <button class="import-btn" id="import-btn" onclick="importList()">Import →</button>
    </div>
  </div>

  <!-- Carried forward -->
  <div id="carried-section" style="display:none">
    <div class="section-label">Carried forward</div>
    <div class="action-list" id="carried-list"></div>
  </div>

  <!-- Today's items -->
  <div class="section-label">Today</div>
  <div class="action-list" id="today-list">
    <div class="empty-list" id="empty-state">
      <strong>Nothing here yet</strong>
      Paste your morning Claude output above to get started
    </div>
  </div>

  <!-- Add manually -->
  <div class="add-row">
    <input class="add-input" id="add-input" type="text" placeholder="Add something that just came up..." onkeydown="if(event.key==='Enter')addManual()">
    <select class="priority-select" id="add-priority">
      <option value="1">P1 urgent</option>
      <option value="2" selected>P2 today</option>
      <option value="3">P3 later</option>
    </select>
    <button class="add-btn" onclick="addManual()">+ Add</button>
  </div>

</div>

<!-- EOD Modal -->
<div class="eod-overlay" id="eod-overlay" onclick="if(event.target===this)closeEOD()">
  <div class="eod-modal">
    <div class="eod-modal-header">
      <span class="eod-modal-title">End of day — what carries forward?</span>
      <button class="close-btn" onclick="closeEOD()">✕</button>
    </div>
    <div class="eod-body">
      <div class="eod-section-label">Unfinished items — carry forward or drop?</div>
      <div id="eod-items"></div>
      <div id="eod-empty" style="display:none; font-size:13px; color:var(--text-3); padding:12px 0;">Everything is done. Nice work.</div>
      <div class="eod-actions">
        <button class="eod-cancel-btn" onclick="closeEOD()">Cancel</button>
        <button class="eod-confirm-btn" onclick="confirmEOD()">Close out day →</button>
      </div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'checkin-v2';

let state = {
  actions: [],
  counter: 0,
  lastDate: null
};

// Load state
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e) {}
  checkDateRollover();
  renderAll();
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function checkDateRollover() {
  const today = todayStr();
  if (state.lastDate && state.lastDate !== today) {
    // New day — mark non-carried items as stale, keep carried
    state.actions = state.actions
      .filter(a => !a.done)
      .map(a => ({ ...a, carried: true }));
  }
  state.lastDate = today;
  saveState();
}

function todayStr() {
  return new Date().toDateString();
}

// API Key
function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) return;
  localStorage.setItem('anthropic-key', key);
  document.getElementById('api-key-input').value = '';
  updateKeyStatus();
}

function getApiKey() {
  return localStorage.getItem('anthropic-key') || '';
}

function updateKeyStatus() {
  const el = document.getElementById('key-status');
  const inp = document.getElementById('api-key-input');
  if (getApiKey()) {
    el.textContent = 'Key set';
    el.className = 'key-status key-set';
    inp.placeholder = 'API key saved — paste a new one to update';
  } else {
    el.textContent = 'No key';
    el.className = 'key-status key-missing';
  }
}

// Import via Claude API
async function importList() {
  const text = document.getElementById('import-textarea').value.trim();
  if (!text) return;

  const btn = document.getElementById('import-btn');
  btn.textContent = 'Parsing...';
  btn.disabled = true;

  const apiKey = getApiKey();

  if (!apiKey) {
    // Fallback: basic line-by-line parse without AI
    parseBasic(text);
    btn.textContent = 'Import →';
    btn.disabled = false;
    document.getElementById('import-textarea').value = '';
    return;
  }

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `Parse this to-do list or morning check-in output into structured action items. For each item extract: text (the task), priority (1=urgent/P1/must do today, 2=important/P2/should do today, 3=nice to have/P3/later), source (where it came from — e.g. "Slack", "email", "Granola", "ClickUp", a person's name, or a workstream name like "Fuse" or "Pipeline"). Infer priority from language: words like "urgent", "blocker", "today", "ASAP" = P1. Normal tasks = P2. "Eventually", "someday", "low priority" = P3. Return ONLY a JSON array, no markdown fences:\n[{"text":"...","priority":1,"source":"..."}]\n\nList:\n${text}`
        }]
      })
    });

    const data = await res.json();
    const raw = data.content?.find(b => b.type === 'text')?.text || '[]';
    const clean = raw.replace(/```json\n?|```/g, '').trim();
    const items = JSON.parse(clean);

    items.forEach(i => addAction(i.text, i.priority || 2, i.source || '', false));
    document.getElementById('import-textarea').value = '';

  } catch(e) {
    parseBasic(text);
  }

  btn.textContent = 'Import →';
  btn.disabled = false;
  renderAll();
}

function parseBasic(text) {
  const lines = text.split('\n')
    .map(l => l.replace(/^[-*•\d.]+\s*/, '').trim())
    .filter(l => l.length > 3);

  lines.forEach(line => {
    let priority = 2;
    if (/urgent|asap|blocker|p1|today/i.test(line)) priority = 1;
    if (/later|someday|p3|eventually/i.test(line)) priority = 3;
    addAction(line, priority, '', false);
  });
}

function addAction(text, priority, source, rerender = true) {
  if (!text.trim()) return;
  state.actions.push({
    id: ++state.counter,
    text: text.trim(),
    priority,
    source,
    done: false,
    carried: false,
    date: todayStr()
  });
  saveState();
  if (rerender) renderAll();
}

function addManual() {
  const inp = document.getElementById('add-input');
  const pri = parseInt(document.getElementById('add-priority').value);
  addAction(inp.value, pri, 'manual');
  inp.value = '';
}

function toggleDone(id) {
  const a = state.actions.find(x => x.id === id);
  if (a) { a.done = !a.done; saveState(); renderAll(); }
}

function deleteAction(id) {
  state.actions = state.actions.filter(x => x.id !== id);
  saveState();
  renderAll();
}

function renderActions(listEl, items) {
  if (items.length === 0) return;
  const sorted = [...items].sort((a,b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    return a.priority - b.priority;
  });
  listEl.innerHTML = sorted.map(a => `
    <div class="action-item priority-${a.priority}${a.done ? ' done' : ''}${a.carried ? ' carried' : ''}">
      <div class="check-wrap${a.done ? ' checked' : ''}" onclick="toggleDone(${a.id})">
        <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
          <path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="action-content">
        <div class="action-text">${escHtml(a.text)}</div>
        <div class="action-meta">
          ${a.source ? `<span class="meta-source">${escHtml(a.source)}</span>` : ''}
          ${a.carried ? '<span class="carried-badge">carried forward</span>' : ''}
        </div>
      </div>
      <div class="action-right">
        <span class="priority-pip pip-${a.priority}">P${a.priority}</span>
        <button class="del-btn" onclick="deleteAction(${a.id})" title="Remove">×</button>
      </div>
    </div>
  `).join('');
}

function renderAll() {
  // Date
  document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric'
  });

  const carried = state.actions.filter(a => a.carried);
  const today = state.actions.filter(a => !a.carried);

  // Carried section
  const carriedSection = document.getElementById('carried-section');
  const carriedList = document.getElementById('carried-list');
  if (carried.length > 0) {
    carriedSection.style.display = 'block';
    carriedList.innerHTML = '';
    renderActions(carriedList, carried);
  } else {
    carriedSection.style.display = 'none';
  }

  // Today list
  const todayList = document.getElementById('today-list');
  const emptyState = document.getElementById('empty-state');
  if (today.length === 0) {
    todayList.innerHTML = '';
    if (!emptyState.parentNode) todayList.appendChild(emptyState);
    emptyState.style.display = 'block';
  } else {
    if (emptyState.parentNode) emptyState.style.display = 'none';
    todayList.innerHTML = '';
    renderActions(todayList, today);
  }

  // Stats
  const total = state.actions.length;
  const done = state.actions.filter(a => a.done).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-done').textContent = done;
}

// EOD
let eodChoices = {};

function openEOD() {
  const unfinished = state.actions.filter(a => !a.done);
  eodChoices = {};
  const container = document.getElementById('eod-items');
  const empty = document.getElementById('eod-empty');

  if (unfinished.length === 0) {
    container.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    container.innerHTML = unfinished.map(a => `
      <div class="eod-item">
        <span class="eod-item-text">${escHtml(a.text)}</span>
        <div class="eod-choice">
          <button class="choice-btn" id="carry-${a.id}" onclick="setChoice(${a.id},'carry')">Carry →</button>
          <button class="choice-btn" id="drop-${a.id}" onclick="setChoice(${a.id},'drop')">Drop</button>
        </div>
      </div>
    `).join('');
    // Default all to carry
    unfinished.forEach(a => setChoice(a.id, 'carry'));
  }

  document.getElementById('eod-overlay').classList.add('open');
}

function setChoice(id, choice) {
  eodChoices[id] = choice;
  const carryBtn = document.getElementById('carry-' + id);
  const dropBtn = document.getElementById('drop-' + id);
  if (carryBtn) carryBtn.className = 'choice-btn' + (choice === 'carry' ? ' selected-carry' : '');
  if (dropBtn) dropBtn.className = 'choice-btn' + (choice === 'drop' ? ' selected-drop' : '');
}

function confirmEOD() {
  Object.entries(eodChoices).forEach(([id, choice]) => {
    const numId = parseInt(id);
    if (choice === 'drop') {
      state.actions = state.actions.filter(a => a.id !== numId);
    } else {
      const a = state.actions.find(x => x.id === numId);
      if (a) a.carried = true;
    }
  });
  // Archive done items
  state.actions = state.actions.filter(a => !a.done || a.carried);
  saveState();
  renderAll();
  closeEOD();
}

function closeEOD() {
  document.getElementById('eod-overlay').classList.remove('open');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init
updateKeyStatus();
loadState();
</script>
